        },
        {
          title: 'を vs お',
          html: '<p>Two kana for the same sound. <strong>お</strong> is the everyday "o" — used in regular words. <strong>を</strong> is reserved for marking the direct object in a sentence (Pack 3 territory). When you see を, expect a verb nearby acting on whatever came before it.</p>',
